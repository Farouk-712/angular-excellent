<article class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
  <div class="flex items-start justify-between gap-4">
    <div>
      <p class="text-sm font-semibold text-slate-950">{{ criterion.label }}</p>
      <p class="mt-1 text-xs leading-5 text-slate-500">{{ criterion.explanation }}</p>
    </div>

    <span class="rounded-full border px-3 py-1 text-xs font-semibold" [ngClass]="severityClass">
      {{ severityLabels[criterion.severity] }}
    </span>
  </div>

  <div class="mt-5">
    <div class="flex items-center justify-between text-xs text-slate-500">
      <span>Score pondéré</span>
      <span class="font-semibold text-slate-900">{{ percentage }}%</span>
    </div>

    <div class="mt-2 h-2 rounded-full bg-slate-100" [attr.aria-label]="'Score ' + percentage + '%'">
      <div class="h-2 rounded-full bg-slate-900" [style.width.%]="percentage"></div>
    </div>
  </div>

  @if (criterion.signals.length > 0) {
    <div class="mt-4 flex flex-wrap gap-2">
      @for (signal of criterion.signals; track trackSignal($index, signal)) {
        <span class="rounded-full bg-slate-100 px-2.5 py-1 text-[11px] font-medium text-slate-600">
          {{ signal }}
        </span>
      }
    </div>
  } @else {
    <ng-template>
      <p class="mt-4 text-xs text-slate-400">Aucun signal isolé pour ce critère.</p>
    </ng-template>
  }
</article>
