<form class="grid gap-4 rounded-2xl border border-slate-200 bg-white p-4 md:grid-cols-5" [formGroup]="form">
  <label class="space-y-1 md:col-span-2">
    <span class="text-xs font-semibold text-slate-500">Recherche</span>
    <input
      class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm outline-none transition focus:border-slate-400"
      formControlName="text"
      placeholder="repo, critère, reviewer" />
    @if (hasError('text', 'maxlength')) {
      <span class="text-xs text-rose-600">La recherche est trop longue.</span>
    }
  </label>

  <label class="space-y-1">
    <span class="text-xs font-semibold text-slate-500">Statut</span>
    <select class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm" formControlName="status">
      @for (status of statuses; track status) {
        <option [value]="status">{{ status }}</option>
      }
    </select>
  </label>

  <label class="space-y-1">
    <span class="text-xs font-semibold text-slate-500">Sévérité</span>
    <select class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm" formControlName="severity">
      <option value="">Toutes</option>
      @for (severity of severities; track severity) {
        <option [value]="severity">{{ severity }}</option>
      }
    </select>
  </label>

  <label class="space-y-1">
    <span class="text-xs font-semibold text-slate-500">Score minimum</span>
    <input class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm" type="number" formControlName="minScore" />
    @if (hasError('minScore', 'required')) {
      <span class="text-xs text-rose-600">Champ requis.</span>
    }
  </label>

  <div class="md:col-span-4 flex justify-end">
    <button type="button" class="rounded-xl border border-slate-200 px-4 py-2 text-sm font-semibold text-slate-700" (click)="resetFilters()">
      Réinitialiser
    </button>
  </div>
</form>
