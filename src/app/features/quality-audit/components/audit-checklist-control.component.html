<div class="rounded-2xl border border-slate-200 bg-white p-4">
  <div class="flex items-center justify-between gap-4">
    <div>
      <p class="text-sm font-semibold text-slate-950">Checklist de revue</p>
      <p class="text-xs text-slate-500">
        {{ value.completedCount }} tâche(s) terminée(s), taux requis {{ value.requiredCompletionRate | percent:'1.0-0' }}
      </p>
    </div>

    @if (disabled) {
      <span class="rounded-full border border-slate-200 bg-slate-50 px-3 py-1 text-xs text-slate-500">
        {{ disabledLabel() }}
      </span>
    }
  </div>

  <div class="mt-4 space-y-2">
    @for (item of value.items; track trackItem($index, item)) {
      <button
        type="button"
        class="flex w-full items-center justify-between rounded-xl border px-4 py-3 text-left text-sm transition"
        [ngClass]="item.checked ? 'border-emerald-200 bg-emerald-50 text-emerald-800' : 'border-slate-200 bg-white text-slate-700'"
        [disabled]="disabled"
        (click)="toggleItem(item)">
        <span>{{ item.label }}</span>
        <span class="text-xs font-semibold">{{ item.required ? 'Obligatoire' : 'Optionnel' }}</span>
      </button>
    } @empty {
      <ng-container>
        <p class="rounded-xl border border-dashed border-slate-200 p-4 text-sm text-slate-500">
          Aucun élément dans la checklist.
        </p>
      </ng-container>
    }
  </div>
</div>
