<section class="rounded-2xl border border-slate-200 bg-white p-5">
  <div class="flex items-start justify-between gap-3">
    <div>
      <p class="text-sm font-medium text-slate-500">{{ label }}</p>
      <strong class="mt-2 block text-2xl font-semibold text-slate-950">{{ value }}</strong>
    </div>

    <span class="rounded-full px-2.5 py-1 text-xs font-semibold" [ngClass]="trendClass[trend]">
      {{ trend }}
    </span>
  </div>

  @if (description) {
    <p class="mt-3 text-sm leading-6 text-slate-500">{{ description }}</p>
  }
</section>
