<section class="space-y-6">
  <header>
    <p class="text-sm font-medium text-violet-700">Workflow editor</p>
    <h1 class="text-2xl font-semibold text-slate-950">Create or update enterprise workflow</h1>
  </header>

  @if (error()) {
    <p class="rounded-xl border border-rose-200 bg-rose-50 p-4 text-sm text-rose-700">{{ error() }}</p>
  }

  @if (saving()) {
    <p class="rounded-xl border border-slate-200 bg-white p-4 text-sm text-slate-500">Saving workflow...</p>
  }

  <app-workflow-form-wizard (submitted)="save($event)" />
</section>
